<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse your complete activity history on StrideMetrics — runs, cycles, swims, strength training, and yoga. Filter by type and review performance metrics." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="StrideMetrics" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="canonical" href="https://stride-metrics.app/activities.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="StrideMetrics" />
  <meta property="og:title" content="Activities — StrideMetrics" />
  <meta property="og:description" content="View and filter all your running, cycling, swimming, and strength training activities with detailed metrics." />
  <meta property="og:url" content="https://stride-metrics.app/activities.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Activities — StrideMetrics" />
  <meta name="twitter:description" content="View and filter all your running, cycling, swimming, and strength training activities." />
  <title>Activities — StrideMetrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Activities — StrideMetrics",
    "url": "https://stride-metrics.app/activities.html",
    "description": "Complete activity log for running, cycling, swimming, and other workouts."
  }
  </script>
  <style>
    .activity-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .activity-card {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
    }

    .activity-card:hover {
      border-color: var(--border-light);
      transform: translateY(-1px);
    }

    .activity-card-accent {
      width: 4px;
      flex-shrink: 0;
      background: var(--accent-color, var(--accent));
    }

    .activity-card-body {
      flex: 1;
      padding: 18px 20px;
      min-width: 0;
    }

    .activity-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 12px;
    }

    .activity-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px 3px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .activity-type-badge svg {
      width: 14px;
      height: 14px;
    }

    .activity-date {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .activity-route {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .activity-notes {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .activity-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .activity-metric {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .activity-metric-value {
      font-size: 0.95rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .activity-metric-value.subtype {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .activity-metric-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .week-group {
      margin-bottom: 28px;
    }

    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
      padding: 0 4px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .week-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: -0.01em;
    }

    .week-summary {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .week-summary-dot {
      color: var(--border-light);
    }

    .cross-train-text {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 2px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="6"/>
      </svg>
      <span>StrideMetrics</span>
    </div>
    <nav class="nav">
      <a class="nav-item" href="/" title="Dashboard overview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a class="nav-item active" href="/activities.html" title="Activity log">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 4a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/><path d="M12 6v6l-3 4"/><path d="M14 12l3 4"/><path d="M8 22l2-4"/></svg>
        Activities
      </a>
      <a class="nav-item" href="/goals.html" title="Running goals">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
        Goals
      </a>
      <a class="nav-item" href="#" title="Analytics">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        Analytics
      </a>
      <a class="nav-item" href="#" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">RM</div>
        <div class="user-info">
          <span class="user-name">Rachel Marsh</span>
          <span class="user-plan">Pro Plan</span>
        </div>
      </div>
    </div>
  </div>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <h1 class="page-title">Activities</h1>
        <span class="date-range">Every run, ride, swim, and more</span>
      </div>
      <div class="header-right">
        <div class="filters" id="typeFilter">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="run">Run</button>
          <button class="filter-chip" data-filter="cycle">Cycle</button>
          <button class="filter-chip" data-filter="swim">Swim</button>
          <button class="filter-chip" data-filter="strength">Strength</button>
          <button class="filter-chip" data-filter="yoga">Yoga</button>
          <button class="filter-chip" data-filter="walk">Walk</button>
        </div>
      </div>
    </header>

    <div class="stats-grid" id="activityStats"></div>

    <div id="activityList"></div>
  </main>

  <script src="activities.js"></script>
</body>
</html>
