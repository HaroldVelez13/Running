<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals — StrideMetrics</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color var(--transition), transform var(--transition);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .goal-card:hover {
      border-color: var(--border-light);
      transform: translateY(-1px);
    }

    .goal-card-head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .goal-icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .goal-icon-wrap svg {
      width: 18px;
      height: 18px;
    }

    .goal-info {
      flex: 1;
      min-width: 0;
    }

    .goal-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    .goal-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .goal-status-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .goal-progress-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .goal-values {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-variant-numeric: tabular-nums;
    }

    .goal-current {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1;
    }

    .goal-sep {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .goal-target {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .goal-unit {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-left: 2px;
    }

    .goal-progress-bar-bg {
      height: 8px;
      background: var(--surface-raised);
      border-radius: 4px;
      overflow: hidden;
    }

    .goal-progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 600ms ease;
    }

    .goal-progress-bottom {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
    }

    .goal-pct {
      font-weight: 600;
      color: var(--text-muted);
    }

    .goal-deadline {
      color: var(--text-dim);
    }

    .goal-milestones {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .milestones-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
      flex-shrink: 0;
    }

    .milestones-track {
      display: flex;
      gap: 6px;
      flex: 1;
    }

    .milestone-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--border-light);
      background: transparent;
      transition: all var(--transition);
    }

    @media (max-width: 1000px) {
      .goals-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .goal-card { padding: 16px; }
      .goal-current { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
