<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StrideMetrics running dashboard — track your distance, pace, heart rate, and elevation. View weekly charts, heart rate zones, and recent run history." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="StrideMetrics" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="canonical" href="https://stride-metrics.app/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="StrideMetrics" />
  <meta property="og:title" content="StrideMetrics — Running Dashboard" />
  <meta property="og:description" content="Track your running performance with StrideMetrics. Monitor distance, pace, heart rate, and elevation with interactive charts and detailed run logs." />
  <meta property="og:url" content="https://stride-metrics.app/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="StrideMetrics — Running Dashboard" />
  <meta name="twitter:description" content="Track your running performance with StrideMetrics. Monitor distance, pace, heart rate, and elevation." />
  <title>StrideMetrics — Running Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "StrideMetrics",
    "url": "https://stride-metrics.app/",
    "description": "Running performance dashboard with activity tracking, goals, and analytics."
  }
  </script>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="6"/>
      </svg>
      <span>StrideMetrics</span>
    </div>
    <nav class="nav">
      <a class="nav-item active" href="/" title="Dashboard overview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </a>
      <a class="nav-item" href="/activities.html" title="Activity log">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 4a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/><path d="M12 6v6l-3 4"/><path d="M14 12l3 4"/><path d="M8 22l2-4"/></svg>
        Activities
      </a>
      <a class="nav-item" href="/goals.html" title="Running goals">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
        Goals
      </a>
      <a class="nav-item" href="#" title="Analytics">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        Analytics
      </a>
      <a class="nav-item" href="#" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">RM</div>
        <div class="user-info">
          <span class="user-name">Rachel Marsh</span>
          <span class="user-plan">Pro Plan</span>
        </div>
      </div>
    </div>
  </div>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <h1 class="page-title">Dashboard</h1>
        <span class="date-range" id="dateRangeDisplay">May 2026</span>
      </div>
      <div class="header-right">
        <div class="view-toggles" id="viewToggles">
          <button class="toggle-btn active" data-view="month">Month</button>
          <button class="toggle-btn" data-view="week">Week</button>
          <button class="toggle-btn" data-view="all">All Time</button>
        </div>
      </div>
    </header>

    <div class="stats-grid" id="statsGrid">
    </div>

    <div class="charts-row">
      <div class="card chart-card">
        <div class="card-header">
          <h2 class="card-title">Weekly Distance</h2>
          <span class="card-badge">km</span>
        </div>
        <div class="chart-container">
          <svg id="weeklyChart" viewBox="0 0 600 220" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
      <div class="card chart-card">
        <div class="card-header">
          <h2 class="card-title">Heart Rate Zones</h2>
          <span class="card-badge">% of time</span>
        </div>
        <div class="chart-container" id="hrZonesContainer">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Recent Runs</h2>
        <div class="filters" id="distanceFilter">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="5k">5K</button>
          <button class="filter-chip" data-filter="10k">10K</button>
          <button class="filter-chip" data-filter="half">Half Marathon</button>
          <button class="filter-chip" data-filter="marathon">Marathon</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table class="runs-table" id="runsTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Route</th>
              <th>Distance</th>
              <th>Duration</th>
              <th>Pace</th>
              <th>Heart Rate</th>
              <th>Elevation</th>
            </tr>
          </thead>
          <tbody id="runsTableBody">
          </tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <p>No runs match this filter</p>
          <span>Try a different distance type</span>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
